- name: GroupAttributes
  purpose: "group transparency attributes"
  goType: graphics/group.TransparencyAttributes
  pdfType: Group
  pdfRepr: dict
  introduced: '1.4'
  specTable: Table 94
  fields:
  - goName:
    pdfKey: Type
    pdfType: name
    required: false
    introduced: '1.4'
    possibleValues:
    - Group
    notes: Table 94 and Table 145
  - goName:
    pdfKey: S
    pdfType: name
    required: true
    introduced: '1.4'
    possibleValues:
    - Transparency
  - goName: CS
    pdfKey: CS
    pdfType: array;name
    required: false
    introduced: '1.4'
    possibleValues:
    - DeviceCMYK
    - DeviceRGB
    - DeviceGray
    refTypes:
    - DeviceGrayColorSpace
    - DeviceRGBColorSpace
    - DeviceCMYKColorSpace
    - CalGrayColorSpace
    - CalRGBColorSpace
    - ICCBasedColorSpace
    goType: color.Space
    purpose: 'CS is the group color space, used for compositing within the group.

      For isolated groups, this specifies the color space for compositing.

      For non-isolated groups, this is inherited from the parent if not set.


      The color space must be a device or CIE-based color space that treats

      its components as independent additive or subtractive values.

      Special color spaces (Pattern, Indexed, Separation, DeviceN) and

      Lab color spaces are not allowed.'
  - goName: Isolated
    goType: bool
    pdfKey: I
    pdfType: boolean
    required: false
    default: false
    introduced: '1.4'
  - goName: Knockout
    goType: bool
    pdfKey: K
    pdfType: boolean
    required: false
    default: false
    introduced: '1.4'
  readFunc: group.ExtractTransparencyAttributes
  fileDependent: false
  writeMethod: (*TransparencyAttributes).Embed
  goPackage: group
  goRepr: struct
  specSection: '8.10'
