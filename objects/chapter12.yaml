  specTable: Table 226
  fileDependent: true
  notes: |
    Inheritable attributes (FT, Ff, V, DV, DA, Q, MaxLen) are flattened onto the
    descendant terminal fields on read; on write the encoder hoists shared values
    back into group dictionaries (and the form's DA/Q) where it shrinks the file.
