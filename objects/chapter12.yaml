    goType: float64
    purpose: "LL (Leader Line Length) shifts the line perpendicular to its direction\nand connects the original endpoints to the shifted line with\nperpendicular segments.\n\n - Positive values: shift the
      line to the left (when viewed from start to end)\n - Negative values: shift the line to the right\n\nThis creates a bracket-like shape: two perpendicular segments connecting\nthe original endpoints
